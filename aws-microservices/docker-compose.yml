# Local simulation of the AWS microservices topology.
#
#   metrics  (gRPC :50051) ┐
#                          ├──> bff (WS/REST :8080) ──> frontend :3000 ──> browser
#   logs     (gRPC :50052) ┘
#
# LocalStack is on the network so CDK `cdklocal deploy` can target it from
# the host (or from a sidecar) — it's not required to run the data path.

services:
  localstack:
    image: localstack/localstack:3.7
    container_name: webgraph-localstack
    restart: unless-stopped
    environment:
      SERVICES: "ecs,ecr,cloudformation,iam,logs,ec2,elbv2,servicediscovery,ssm"
      DEFAULT_REGION: "ap-northeast-1"
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  metrics-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: metrics
    image: webgrapgh-aws-metrics
    container_name: webgraph-metrics
    restart: unless-stopped
    environment:
      PORT: "50051"
      PUSH_HZ: "${PUSH_HZ:-20}"
      HISTORY_SIZE: "${METRICS_HISTORY:-20000}"
      SEED_MINUTES: "60"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    expose:
      - "50051"
    ports:
      - "50051:50051"

  logs-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: logs
    image: webgrapgh-aws-logs
    container_name: webgraph-logs
    restart: unless-stopped
    environment:
      PORT: "50052"
      LOG_PUSH_HZ: "${LOG_PUSH_HZ:-30}"
      RING_SIZE: "30000"
      SEED_COUNT: "5000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    expose:
      - "50052"
    ports:
      - "50052:50052"

  bff-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: bff
    image: webgrapgh-aws-bff
    container_name: webgraph-bff
    restart: unless-stopped
    depends_on:
      - metrics-service
      - logs-service
    environment:
      PORT: "8080"
      METRICS_ADDR: "metrics-service:50051"
      LOGS_ADDR: "logs-service:50052"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    ports:
      - "8080:8080"

  # Reuses the existing Next.js Dockerfile so the frontend doesn't fork.
  # It points at :8080 which is now the BFF (same wire format as the monolith).
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-http://localhost:8080}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}"
    container_name: webgraph-frontend-aws
    restart: unless-stopped
    depends_on:
      - bff-service
    ports:
      - "3000:3000"
