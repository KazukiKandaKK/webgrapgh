syntax = "proto3";

package logs;

option go_package = "github.com/KazukiKandaKK/webgrapgh/aws-microservices/proto/logs;logspb";

// LogEvent mirrors the monolith's logs.Event JSON shape so BFF can re-emit
// it on /ws/logs without remapping fields.
message LogEvent {
  int64 id = 1;
  int64 timestamp_ms = 2;
  string level = 3;
  string source = 4;
  string message = 5;
}

message StreamRequest {}

message HistoryRequest {
  // Max events to return. Server caps to its ring capacity.
  int32 limit = 1;
}

message HistoryResponse {
  repeated LogEvent events = 1;
}

service LogService {
  rpc StreamRealtime(StreamRequest) returns (stream LogEvent);
  rpc GetHistory(HistoryRequest) returns (HistoryResponse);
}
