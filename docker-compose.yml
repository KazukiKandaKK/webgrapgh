services:
  postgres:
    image: postgres:16-alpine
    container_name: webgraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgraph}
      POSTGRES_DB: ${POSTGRES_DB:-webgraph}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - webgraph_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webgraph} -d ${POSTGRES_DB:-webgraph}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webgraph-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network the DB is reachable by its service name.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-webgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgraph}
      POSTGRES_DB: ${POSTGRES_DB:-webgraph}
      BACKEND_PORT: 8080
      SEED_POINTS_PER_METRIC: ${SEED_POINTS_PER_METRIC:-20000}
      PUSH_HZ: ${PUSH_HZ:-20}
      # The browser (not the container) opens the WS, so the origin it sends
      # is the host-exposed origin of the frontend service.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"

  # Independent data producer. Inserts one row per metric per tick into PG and
  # issues NOTIFY metrics_new; the server's watcher LISTENs and broadcasts.
  # Decoupled from the WebSocket layer: scaling writers up doesn't require any
  # server changes (the watcher picks up every NEW row regardless of origin).
  writer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: webgrapgh-backend
    container_name: webgraph-writer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-webgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgraph}
      POSTGRES_DB: ${POSTGRES_DB:-webgraph}
      PUSH_HZ: ${PUSH_HZ:-20}
    entrypoint: ["/app/writer"]

  # Container-metrics producer. Polls the Docker daemon for every running
  # container's stats (CPU%, memory, network throughput), inserts them into the
  # container_metrics table, and issues NOTIFY container_metrics_new; the
  # server's container watcher LISTENs and broadcasts to /ws/containers.
  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: webgrapgh-backend
    container_name: webgraph-collector
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-webgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgraph}
      POSTGRES_DB: ${POSTGRES_DB:-webgraph}
      DOCKER_HOST: unix:///var/run/docker.sock
      COLLECT_HZ: ${COLLECT_HZ:-1}
    # Read-only mount of the host Docker socket so the collector can enumerate
    # and measure arbitrary running containers. Runs as root because the socket
    # is group-owned by `docker` on the host.
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/app/collector"]

  # One-shot bulk seeder. Lives in the `seed` profile so it never runs as part
  # of a plain `docker compose up`. Trigger explicitly:
  #
  #   docker compose --profile seed run --rm seed --hours 24 --hz 100 --reset
  #
  # Reuses the backend image (both /app/server and /app/seed are baked in).
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: webgrapgh-backend
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-webgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgraph}
      POSTGRES_DB: ${POSTGRES_DB:-webgraph}
    entrypoint: ["/app/seed"]

  # Next.js (React) frontend. Opt-in via `--profile next`. Bring it up like:
  #   docker compose stop frontend-svelte
  #   docker compose --profile next up -d frontend
  frontend:
    build:
      # Context is the repo root so the build can access ../shared.
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Compiled into the JS bundle that ships to the browser. These point at
        # the host-exposed backend port — the browser cannot reach `backend:8080`.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
    container_name: webgraph-frontend
    profiles: ["next"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # SolidJS rewrite. Opt-in via `--profile solid`. Bring it up like:
  #   docker compose stop frontend
  #   docker compose --profile solid up -d frontend-solid
  # Shares the same wire format with the backend — no server change needed.
  frontend-solid:
    build:
      # Context is the repo root so the build can access ../shared.
      context: .
      dockerfile: frontend-solid/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
        VITE_WS_LOGS_URL: ${VITE_WS_LOGS_URL:-ws://localhost:8080/ws/logs}
    image: webgrapgh-frontend-solid
    container_name: webgraph-frontend-solid
    profiles: ["solid"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # Default: Svelte rewrite (minimal-dependency build). Runs as part of a plain
  # `docker compose up`. To swap to another implementation, stop this and start
  # `frontend` (profile: ["next"]) or `frontend-solid` (profile: ["solid"]).
  # Shares the same wire format with the backend — no server change needed.
  frontend-svelte:
    build:
      # Context is the repo root so the build can access ../shared.
      context: .
      dockerfile: frontend-svelte/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
        VITE_WS_LOGS_URL: ${VITE_WS_LOGS_URL:-ws://localhost:8080/ws/logs}
    image: webgrapgh-frontend-svelte
    container_name: webgraph-frontend-svelte
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  webgraph_pgdata:
